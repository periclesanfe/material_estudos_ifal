<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFAL BSI — Redirecionando</title>
    <script>
      (function redirectToSinglePageApp(location) {
        var pathSegmentsToKeep = 1;
        var basePath = location.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/');
        var routePath = location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');
        var search = location.search
          ? '&' + location.search.slice(1).replace(/&/g, '~and~')
          : '';

        location.replace(
          location.protocol + '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          basePath +
          '/?/' +
          routePath +
          search +
          location.hash
        );
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
