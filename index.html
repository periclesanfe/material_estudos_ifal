<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Repositório colaborativo de material de estudo do curso de Bacharelado em Sistemas de Informação do IFAL. Conteúdos organizados por matéria com quizzes interativos e geração por IA." />
    <meta name="theme-color" content="#0f0f12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <title>IFAL BSI — Material de Estudo</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function setInitialTheme() {
        try {
          var storedTheme = localStorage.getItem('ifal_bsi_theme');
          var theme = storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_error) {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      }());

      (function restoreGitHubPagesRoute(location) {
        if (location.search[1] !== '/') return;

        var decodedPath = location.search
          .slice(1)
          .split('&')
          .map(function replaceEncodedAmpersand(part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, '', location.pathname.slice(0, -1) + decodedPath + location.hash);
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
